version: '3.9'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb --ignore-existing local/scheduler-videos;
      /usr/bin/mc anonymous set public local/scheduler-videos;
      echo 'MinIO bucket created';
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/scheduler
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      LATE_API_KEY: ${LATE_API_KEY:-}
      LATE_API_BASE_URL: ${LATE_API_BASE_URL:-https://api.getlate.dev}
      LATE_WEBHOOK_SECRET: ${LATE_WEBHOOK_SECRET:-}
      S3_BUCKET: ${S3_BUCKET:-scheduler-videos}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY:-minioadmin}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-eu-west-3}
      S3_ENDPOINT: http://minio:9000
      VIDEO_RETENTION_DAYS: ${VIDEO_RETENTION_DAYS:-30}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
